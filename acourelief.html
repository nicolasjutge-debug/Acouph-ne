<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-name" content="AcouRelief">
<meta name="theme-color" content="#080b12">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>AcouRelief</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080b12;color:#c8d0e8;font-family:Georgia,serif;overflow:hidden;-webkit-user-select:none;user-select:none}
#app{display:flex;flex-direction:column;height:100%;padding-top:env(safe-area-inset-top,0px)}
h1{font-size:22px;font-weight:400;letter-spacing:3px;background:linear-gradient(135deg,#7aa2f7,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#tabs{display:flex;background:#0f1320;border-bottom:1px solid #1a2038;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:10px 11px;border:none;background:transparent;color:#4a5278;font-family:monospace;font-size:9px;letter-spacing:1px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.tab.on{color:#7aa2f7;border-bottom-color:#7aa2f7}
#content{flex:1;overflow-y:auto;padding:11px 11px calc(16px + env(safe-area-inset-bottom,0px));-webkit-overflow-scrolling:touch}
.card{background:#0f1320;border:1px solid #1a2038;border-radius:14px;padding:13px 14px;margin-bottom:10px}
.card-hi{background:#0d1228;border-color:#1a2a50}
.lbl{font-size:9px;color:#4a5278;letter-spacing:3px;font-family:monospace;display:block;margin-bottom:5px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 13px;border-radius:10px;border:1px solid #7aa2f755;background:transparent;color:#7aa2f7;font-family:monospace;font-size:10px;letter-spacing:2px;cursor:pointer;white-space:nowrap}
.btn:active{opacity:.7}
.btn-w{width:100%}
.btn-p{background:#1a2a50}
.btn-g{border-color:#4ade8055;background:#0a2010;color:#4ade80}
.btn-r{border-color:#f8717155;color:#f87171}
.btn-o{border-color:#fb923c55;background:#1a0e00;color:#fb923c}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stat{background:#0f1320;border:1px solid #1a2038;border-radius:12px;padding:9px 4px;text-align:center}
.stat-v{font-size:17px;color:#7aa2f7}
.stat-l{font-size:7px;color:#4a5278;letter-spacing:2px;font-family:monospace;margin-top:2px}
.lvl-btn{width:30px;height:30px;border-radius:8px;border:1px solid #1a2038;background:transparent;color:#4a5278;font-size:11px;cursor:pointer;font-family:monospace}
.lvl-btn.on{border-color:#7aa2f7;background:#1a2a50;color:#7aa2f7}
.prog-wrap{background:#1a2038;border-radius:99px;height:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s}
.sess-row{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:10px;background:#080b12;border:1px solid #1a2038;margin-bottom:5px}
.check{width:26px;height:26px;border-radius:50%;border:2px solid #1a2038;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#4ade80;flex-shrink:0}
.check.done{border-color:#4ade80;background:#0a2010}
input[type=range]{width:100%;accent-color:#7aa2f7;cursor:pointer}
textarea{width:100%;padding:9px 11px;border-radius:10px;border:1px solid #1a2038;background:#080b12;color:#c8d0e8;font-size:12px;font-family:Georgia,serif;resize:vertical;outline:none;box-sizing:border-box}
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a2a50;border:1px solid #7aa2f7;border-radius:12px;padding:8px 18px;font-size:11px;font-family:monospace;letter-spacing:2px;color:#7aa2f7;opacity:0;transition:opacity .3s;z-index:300;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1}
/* TIMER OVERLAY */
#timer-ov{position:fixed;inset:0;background:rgba(8,11,18,.97);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px}
#timer-ov.open{display:flex}
/* RESSENTI OVERLAY */
#ressenti-ov{position:fixed;inset:0;background:rgba(8,11,18,.98);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:0}
#ressenti-ov.open{display:flex}
</style>
</head>
<body>
<div id="app">
  <div style="text-align:center;padding:11px 16px 7px;flex-shrink:0">
    <h1>AcouRelief</h1>
    <div id="hdr-sub" style="font-size:9px;color:#4a5278;font-family:monospace;margin-top:2px"></div>
  </div>
  <div id="tabs">
    <button class="tab on" onclick="showTab('sons')">🎵 Sons</button>
    <button class="tab" onclick="showTab('prog')">📅 Programme</button>
    <button class="tab" onclick="showTab('audio')">🔬 Audiogramme</button>
    <button class="tab" onclick="showTab('ex')">🧘 Exercices</button>
    <button class="tab" onclick="showTab('journal')">📓 Journal</button>
    <button class="tab" onclick="showTab('data')">💾 Données</button>
  </div>
  <div id="content">
    <div id="tab-sons"></div>
    <div id="tab-prog" style="display:none"></div>
    <div id="tab-audio" style="display:none"></div>
    <div id="tab-ex" style="display:none"></div>
    <div id="tab-journal" style="display:none"></div>
    <div id="tab-data" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<!-- TIMER OVERLAY -->
<div id="timer-ov">
  <div id="t-name" style="font-size:13px;letter-spacing:2px;font-family:monospace"></div>
  <div style="position:relative;width:200px;height:200px">
    <svg width="200" height="200" style="transform:rotate(-90deg)">
      <circle cx="100" cy="100" r="90" fill="none" stroke="#1a2038" stroke-width="9"/>
      <circle id="t-ring" cx="100" cy="100" r="90" fill="none" stroke="#7aa2f7" stroke-width="9" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px">
      <div id="t-big" style="font-size:40px;font-weight:300;font-family:monospace;color:#c8d0e8;letter-spacing:2px">00:00</div>
      <div id="t-lbl" style="font-size:8px;letter-spacing:4px;color:#4a5278;font-family:monospace">EN COURS</div>
      <div id="t-rem" style="font-size:9px;color:#4a5278;font-family:monospace"></div>
    </div>
  </div>
  <canvas id="t-wave" width="280" height="44" style="max-width:280px;width:100%;height:44px;border-radius:8px"></canvas>
  <div id="t-ctx" style="font-size:9px;color:#4a5278;font-family:monospace;text-align:center"></div>
  <div class="prog-wrap" style="width:100%;max-width:280px"><div class="prog-fill" id="t-pg" style="width:0%"></div></div>
  <div style="display:flex;gap:10px;margin-top:6px">
    <button class="btn btn-r" onclick="cancelTimer()">✕ Annuler</button>
    <button class="btn btn-o" id="t-pause-btn" onclick="pauseTimer()">⏸ Pause</button>
    <button class="btn btn-g" onclick="validateTimer()">✓ Valider</button>
  </div>
</div>

<!-- RESSENTI OVERLAY (obligatoire avant chaque séance) -->
<div id="ressenti-ov">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:10px;letter-spacing:3px;color:#c084fc;font-family:monospace;margin-bottom:6px">📊 RESSENTI DU JOUR</div>
      <div style="font-size:12px;color:#4a5278;line-height:1.6">Remplis ton ressenti avant de commencer la séance.<br>C'est obligatoire pour suivre ton évolution.</div>
    </div>

    <!-- Intensité -->
    <div class="card card-hi" style="margin-bottom:10px">
      <span class="lbl">INTENSITÉ ACOUPHÈNE (1–10)</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px" id="r-lvl-row"></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#4a5278;font-family:monospace;padding:0 2px">
        <span>Léger</span><span>Modéré</span><span>Fort</span>
      </div>
    </div>

    <!-- Type d'acouphène -->
    <div class="card" style="margin-bottom:10px">
      <span class="lbl">TYPE DE SON</span>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="r-type-row">
        <button class="btn r-type-btn" data-v="sifflement" onclick="selectRType(this)">🎵 Sifflement</button>
        <button class="btn r-type-btn" data-v="bourdonnement" onclick="selectRType(this)">🔊 Bourdonnement</button>
        <button class="btn r-type-btn" data-v="cliquetis" onclick="selectRType(this)">🔔 Cliquetis</button>
        <button class="btn r-type-btn" data-v="pulsatile" onclick="selectRType(this)">💓 Pulsatile</button>
      </div>
    </div>

    <!-- Facteurs -->
    <div class="card" style="margin-bottom:10px">
      <span class="lbl">FACTEURS AGGRAVANTS (plusieurs possibles)</span>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="r-factors-row">
        <button class="btn r-factor-btn" data-v="stress" onclick="toggleFactor(this)">😰 Stress</button>
        <button class="btn r-factor-btn" data-v="fatigue" onclick="toggleFactor(this)">😴 Fatigue</button>
        <button class="btn r-factor-btn" data-v="bruit" onclick="toggleFactor(this)">🔈 Bruit</button>
        <button class="btn r-factor-btn" data-v="caféine" onclick="toggleFactor(this)">☕ Caféine</button>
        <button class="btn r-factor-btn" data-v="alcool" onclick="toggleFactor(this)">🍷 Alcool</button>
        <button class="btn r-factor-btn" data-v="aucun" onclick="toggleFactor(this)">✓ Aucun</button>
      </div>
    </div>

    <!-- Note libre -->
    <div style="margin-bottom:12px">
      <span class="lbl">NOTE LIBRE (optionnel)</span>
      <textarea id="r-note" rows="2" placeholder="Contexte, observations…" style="font-size:11px"></textarea>
    </div>

    <button class="btn btn-p btn-w" style="border-color:#c084fc55;color:#c084fc;font-size:11px;padding:12px" onclick="submitRessenti()">
      ✓ VALIDER LE RESSENTI ET COMMENCER
    </button>
  </div>
</div>

<script>
// ═══ AUDIO ═══════════════════════════════════════════════
var AC=null,MG=null;
function getCtx(){
  if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();MG=AC.createGain();MG.connect(AC.destination);MG.gain.value=.5;var ka=AC.createOscillator();var kg=AC.createGain();kg.gain.value=.00001;ka.connect(kg);kg.connect(AC.destination);ka.start();}catch(e){return null;}}
  if(AC.state==='suspended')AC.resume();return AC;
}
function setVol(v){if(MG)MG.gain.value=v/100*.8;}
function nBuf(t){var a=getCtx();if(!a)return null;var sz=a.sampleRate*4,b=a.createBuffer(1,sz,a.sampleRate),d=b.getChannelData(0);
  if(t==='w'){for(var i=0;i<sz;i++)d[i]=Math.random()*2-1;}
  else if(t==='p'){var b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(var i=0;i<sz;i++){var w=Math.random()*2-1;b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;b2=.969*b2+w*.153852;b3=.8665*b3+w*.3104856;b4=.55*b4+w*.5329522;b5=-.7616*b5-w*.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*.5362)/7;b6=w*.115926;}}
  else{var l=0;for(var i=0;i<sz;i++){var w=Math.random()*2-1;d[i]=(l+.02*w)/1.02;l=d[i];d[i]*=3.5;}}
  var s=a.createBufferSource();s.buffer=b;s.loop=true;return s;}
function playNoise(t){var a=getCtx();if(!a)return null;var s=nBuf(t==='white'?'w':t==='pink'?'p':'b');if(!s)return null;s.connect(MG);s.start();return{stop:function(){try{s.stop();}catch(e){}}};}
function playNotch(freq){var a=getCtx();if(!a)return null;var s=nBuf('w');if(!s)return null;var nf=a.createBiquadFilter();nf.type='notch';nf.frequency.value=freq;nf.Q.value=5;var lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=12000;s.connect(nf);nf.connect(lp);lp.connect(MG);s.start();return{stop:function(){try{s.stop();}catch(e){}}};}
function playNature(t){var a=getCtx();if(!a)return null;var ns=[];
  function mkS(tp){var s=nBuf(tp);return s;}
  if(t==='rain'){var b=mkS('w'),dr=mkS('w');var bf=a.createBiquadFilter();bf.type='lowpass';bf.frequency.value=1200;var bg=a.createGain();bg.gain.value=.38;var df=a.createBiquadFilter();df.type='bandpass';df.frequency.value=3000;df.Q.value=1.5;var dg=a.createGain();dg.gain.value=.18;var lfo=a.createOscillator();lfo.frequency.value=.08;var lg=a.createGain();lg.gain.value=.08;b.connect(bf);bf.connect(bg);dr.connect(df);df.connect(dg);lfo.connect(lg);lg.connect(bg.gain);bg.connect(MG);dg.connect(MG);b.start();dr.start();lfo.start();ns.push(b,dr,lfo);}
  else if(t==='forest'){var w=mkS('p');var wf=a.createBiquadFilter();wf.type='bandpass';wf.frequency.value=400;wf.Q.value=.3;var wg=a.createGain();wg.gain.value=.32;var lfo=a.createOscillator();lfo.frequency.value=.12;var lg=a.createGain();lg.gain.value=.1;w.connect(wf);wf.connect(wg);lfo.connect(lg);lg.connect(wg.gain);wg.connect(MG);w.start();lfo.start();ns.push(w,lfo);}
  else if(t==='ocean'){var w=mkS('b');var wf=a.createBiquadFilter();wf.type='lowpass';wf.frequency.value=800;var wg=a.createGain();wg.gain.value=.45;var lfo=a.createOscillator();lfo.frequency.value=.1;var lg=a.createGain();lg.gain.value=.2;w.connect(wf);wf.connect(wg);lfo.connect(lg);lg.connect(wg.gain);wg.connect(MG);w.start();lfo.start();ns.push(w,lfo);}
  return{stop:function(){ns.forEach(function(n){try{n.stop();}catch(e){}});}};}
function playBin(f){var a=getCtx();if(!a)return null;var L=a.createOscillator(),R=a.createOscillator();L.frequency.value=200;R.frequency.value=200+f;L.type=R.type='sine';var m=a.createChannelMerger(2);var Lg=a.createGain();Lg.gain.value=.25;var Rg=a.createGain();Rg.gain.value=.25;L.connect(Lg);Lg.connect(m,0,0);R.connect(Rg);Rg.connect(m,0,1);m.connect(MG);L.start();R.start();return{stop:function(){try{L.stop();R.stop();}catch(e){}}};}
function playSolf(f){var a=getCtx();if(!a)return null;var o=a.createOscillator();o.frequency.value=f;o.type='sine';var g=a.createGain();g.gain.value=.18;o.connect(g);g.connect(MG);o.start();return{stop:function(){try{o.stop();}catch(e){}}};}
function playTone(f,v,ear){var a=getCtx();if(!a)return null;var o=a.createOscillator();o.frequency.value=f;o.type='sine';var g=a.createGain();g.gain.value=v/100*.35;if(!ear||ear==='both'){o.connect(g);g.connect(MG);}else{var m=a.createChannelMerger(2);var mn=a.createGain();mn.gain.value=1;o.connect(g);g.connect(mn);mn.connect(m,0,ear==='left'?0:1);m.connect(MG);}o.start();return{stop:function(){try{o.stop();}catch(e){}},gn:g};}

// ═══ VOLUME THÉRAPEUTIQUE ═════════════════════════════════
function getVolTip(v){
  if(v===0) return '🔇 Volume à zéro — aucun son.';
  if(v<=20) return '💡 Très bas — monte légèrement jusqu\'à entendre le son.';
  if(v<=35) return '✓ Zone idéale — acouphène encore perceptible en arrière-plan. C\'est le bon niveau.';
  if(v<=50) return '⚠ Légèrement au-dessus — le son peut couvrir l\'acouphène. Baisse un peu.';
  if(v<=65) return '⚠ Trop fort — risque de masquage total et de fatigue auditive.';
  if(v<=80) return '🔴 Dangereux — peut aggraver les acouphènes. Baisse immédiatement.';
  return '🔴 Niveau nocif — risque réel de dommages auditifs. Baisse maintenant.';
}
function updateVol(v){
  volVal=v;
  setVol(v);
  var col=v<=35?'#4ade80':v<=65?'#fbbf24':'#f87171';
  var zone=v<=35?'✓ ZONE THÉRAPEUTIQUE':v<=65?'⚠ LIMITE — BAISSER':'🔴 TROP FORT — RISQUE';
  var pct=document.getElementById('vol-pct');
  var zn=document.getElementById('vol-zone');
  var tip=document.getElementById('vol-tip');
  var sl=document.getElementById('vol-slider');
  if(pct){pct.textContent=v+'%';pct.style.color=col;}
  if(zn){zn.textContent=zone;zn.style.color=col;zn.style.background=col+'11';zn.style.borderColor=col+'33';}
  if(tip)tip.textContent=getVolTip(v);
  if(sl)sl.style.accentColor=col;
}


var waveRaf=null,waveT=0;
function startWave(col,type,cvId){
  stopWave();
  var cv=document.getElementById(cvId||'t-wave');if(!cv)return;
  cv.width=Math.min(280,cv.parentElement?cv.parentElement.offsetWidth:280);
  var ctx=cv.getContext('2d');
  function draw(){waveRaf=requestAnimationFrame(draw);waveT+=.025;ctx.clearRect(0,0,cv.width,cv.height);ctx.strokeStyle=col;ctx.lineWidth=2;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.beginPath();
    for(var x=0;x<cv.width;x++){var n=x/cv.width;var y=cv.height/2;
      if(type==='bin'||type==='solf'){y+=Math.sin(n*Math.PI*5+waveT)*cv.height*.28*Math.sin(waveT*.6)+Math.sin(n*Math.PI*11+waveT*1.4)*cv.height*.1;}
      else if(type==='ocean'){y+=Math.sin(n*Math.PI*3+waveT*.8)*cv.height*.28+Math.sin(n*Math.PI*7+waveT*1.5)*cv.height*.1;}
      else{y+=Math.sin(n*Math.PI*4+waveT)*cv.height*.17+Math.sin(n*Math.PI*9+waveT*1.7)*cv.height*.08+(Math.random()-.5)*cv.height*.04;}
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();ctx.shadowBlur=0;}draw();}
function stopWave(){if(waveRaf){cancelAnimationFrame(waveRaf);waveRaf=null;}}

// ═══ DATA ═════════════════════════════════════════════════
var THERAPIES=[
  {id:'white',name:'Bruit Blanc',desc:'Large spectre',col:'#d4d4d4',acc:'#f0f0f0',ic:'〰',play:function(){return playNoise('white');}},
  {id:'pink',name:'Bruit Rose',desc:'Naturel équilibré',col:'#f4a7c3',acc:'#ff6ba8',ic:'♪',play:function(){return playNoise('pink');}},
  {id:'brown',name:'Bruit Brun',desc:'Graves relaxants',col:'#c4956a',acc:'#e8a96e',ic:'◉',play:function(){return playNoise('brown');}},
  {id:'notch',name:'Notch',desc:'Recalibrage neuronal',col:'#7ec8e3',acc:'#00b4d8',ic:'⌇',play:function(){return playNotch(S.notchHz);}},
  {id:'rain',name:'Pluie',desc:'Sons naturels',col:'#90b4ce',acc:'#4a90d9',ic:'🌧',play:function(){return playNature('rain');}},
  {id:'forest',name:'Forêt',desc:'Anti-stress',col:'#6eb580',acc:'#4ade80',ic:'🌿',play:function(){return playNature('forest');}},
  {id:'ocean',name:'Océan',desc:'Rythme apaisant',col:'#60a5fa',acc:'#3b82f6',ic:'🌊',play:function(){return playNature('ocean');}},
  {id:'delta',name:'Delta 2Hz',desc:'Sommeil',col:'#9b7fd4',acc:'#c084fc',ic:'δ',play:function(){return playBin(2);}},
  {id:'theta',name:'Thêta 6Hz',desc:'Méditation',col:'#6eb5a0',acc:'#2dd4bf',ic:'θ',play:function(){return playBin(6);}},
  {id:'alpha',name:'Alpha 10Hz',desc:'Calme & focus',col:'#f0c060',acc:'#fbbf24',ic:'α',play:function(){return playBin(10);}},
  {id:'gamma',name:'Gamma 40Hz',desc:'Neuroplasticité',col:'#f87171',acc:'#ef4444',ic:'γ',play:function(){return playBin(40);}},
  {id:'528hz',name:'528 Hz',desc:'Solfège',col:'#a78bfa',acc:'#8b5cf6',ic:'✦',play:function(){return playSolf(528);}},
];
var PHASES=['Habituation','Habituation','Thérapie active','Thérapie active','Thérapie active','Thérapie active','Consolidation','Consolidation','Consolidation','Consolidation','Sevrage','Évaluation'];
var PHASE_C=['#60a5fa','#60a5fa','#7aa2f7','#7aa2f7','#7aa2f7','#7aa2f7','#c084fc','#c084fc','#c084fc','#c084fc','#f472b6','#4ade80'];
var PLAN=[
  {m:['pink','alpha'],e:['brown','delta']},{m:['brown','theta'],e:['pink','delta']},
  {m:['notch','alpha'],e:['notch','delta']},{m:['notch','pink'],e:['notch','theta']},
  {m:['notch','alpha'],e:['notch','gamma']},{m:['notch','528hz'],e:['notch','delta']},
  {m:['notch','alpha'],e:['ocean','delta']},{m:['notch','forest'],e:['notch','theta']},
  {m:['notch','gamma'],e:['forest','delta']},{m:['notch','528hz'],e:['ocean','alpha']},
  {m:['pink','alpha'],e:['notch','delta']},{m:['forest','528hz'],e:['ocean','alpha']},
];
var AF=[125,250,500,1000,2000,4000,6000,8000];

// ═══ HELPERS ══════════════════════════════════════════════
function dStr(d){return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function addD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function dlbl(d){return d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}
function isT(d){return d.toDateString()===new Date().toDateString();}
function isPst(d){return d<new Date()&&!isT(d);}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function todayKey(){return new Date().toDateString();}

// ═══ STORE ════════════════════════════════════════════════
var SK='acourelief-v4';
function blank(){return{version:4,startDate:'2026-05-29T00:00:00.000Z',
  prog:Array.from({length:12},function(){return Array.from({length:7},function(){return[false,false];});}),
  journal:[],audiogramSaved:[],sessionLogs:[],
  dailyLogs:[],  // [{date,level,type,factors,note}] — ressenti quotidien
  stats:{sessions:0,minutes:0,streak:0},
  notchHz:8000,todayLevel:null,todayLevelDate:null};}
function mergeS(p){var b=blank();return Object.assign({},b,p,{stats:Object.assign({},b.stats,p.stats||{}),prog:p.prog||b.prog,sessionLogs:p.sessionLogs||[],audiogramSaved:p.audiogramSaved||[],journal:p.journal||[],dailyLogs:p.dailyLogs||[]});}
var S=blank();
function loadS(){try{var r=localStorage.getItem(SK);if(r){var p=JSON.parse(r);if(p&&p.version)S=mergeS(p);}}catch(e){}}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
loadS();

// ═══ RESSENTI QUOTIDIEN ═══════════════════════════════════
var rLvl=5,rType='sifflement',rFactors=[],rNote='';
var pendingSessionAfterRessenti=null; // {th, ctx} ou null

function todayRessenti(){
  // Retourne le ressenti d'aujourd'hui ou null
  var today=todayKey();
  for(var i=0;i<S.dailyLogs.length;i++){if(S.dailyLogs[i].date===today)return S.dailyLogs[i];}
  return null;
}

function openRessenti(pendingSession){
  pendingSessionAfterRessenti=pendingSession||null;
  rLvl=5;rType='sifflement';rFactors=[];rNote='';
  renderRessentiForm();
  document.getElementById('ressenti-ov').classList.add('open');
}

function renderRessentiForm(){
  // Boutons niveau
  var row=document.getElementById('r-lvl-row');
  if(row){row.innerHTML='';for(var n=1;n<=10;n++){var b=document.createElement('button');b.className='lvl-btn'+(n===rLvl?' on':'');b.textContent=n;(function(nn){b.onclick=function(){rLvl=nn;renderRessentiForm();};})(n);row.appendChild(b);}}
  // Type
  document.querySelectorAll('.r-type-btn').forEach(function(b){
    b.style.borderColor=b.dataset.v===rType?'#c084fc':'#1a2038';
    b.style.background=b.dataset.v===rType?'#100a1a':'transparent';
    b.style.color=b.dataset.v===rType?'#c084fc':'#4a5278';
  });
  // Facteurs
  document.querySelectorAll('.r-factor-btn').forEach(function(b){
    var on=rFactors.indexOf(b.dataset.v)>=0;
    b.style.borderColor=on?'#fbbf24':'#1a2038';
    b.style.background=on?'#1a1000':'transparent';
    b.style.color=on?'#fbbf24':'#4a5278';
  });
}

function selectRType(btn){rType=btn.dataset.v;renderRessentiForm();}
function toggleFactor(btn){
  var v=btn.dataset.v;var i=rFactors.indexOf(v);
  if(v==='aucun'){rFactors=i>=0?[]:[v];}
  else{rFactors=rFactors.filter(function(f){return f!=='aucun';});if(i>=0)rFactors.splice(i,1);else rFactors.push(v);}
  renderRessentiForm();
}

function submitRessenti(){
  var noteEl=document.getElementById('r-note');
  var entry={date:todayKey(),dateStr:dStr(new Date()),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),level:rLvl,type:rType,factors:rFactors.slice(),note:noteEl?noteEl.value.trim():''};
  // Remplacer si déjà un aujourd'hui
  S.dailyLogs=S.dailyLogs.filter(function(l){return l.date!==todayKey();});
  S.dailyLogs.unshift(entry);
  S.todayLevel=rLvl;S.todayLevelDate=todayKey();
  saveS();
  document.getElementById('ressenti-ov').classList.remove('open');
  showToast('✓ Ressenti enregistré');
  // Lancer la séance en attente si besoin
  if(pendingSessionAfterRessenti){
    var ps=pendingSessionAfterRessenti;pendingSessionAfterRessenti=null;
    startTimerReal(ps.th,ps.ctx);
  }
  renderAll();
}

// ═══ TIMER ════════════════════════════════════════════════
var tSec=0,tTotal=0,tCtx=null,tTh=null,tPaused=false;
var tStart=null,tBase=0,tInterval=null,sesMin=20,volVal=48;
var activeId=null,activeNode=null;
var expandedWeek=null;

function stopSound(){if(activeNode){activeNode.stop();activeNode=null;}stopWave();releaseWakeLock();}

function startTimerReal(th,ctx){
  stopSound();
  var node=th.id==='notch'?playNotch(S.notchHz):th.play();
  if(!node){showToast('⚠ Appuie d\'abord sur l\'écran');return;}
  activeNode=node;activeId=th.id;
  tTh=th;tCtx=ctx;tSec=0;tBase=0;tPaused=false;
  requestWakeLock();
  tTotal=sesMin*60;tStart=Date.now();
  clearInterval(tInterval);
  tInterval=setInterval(function(){
    if(tPaused)return;
    tSec=tBase+Math.floor((Date.now()-tStart)/1000);
    updateTimerUI();
    if(tSec>=tTotal){clearInterval(tInterval);finalizeSession(true);}
  },500);
  var ov=document.getElementById('timer-ov');ov.classList.add('open');
  document.getElementById('t-name').textContent=th.ic+' '+th.name.toUpperCase();
  document.getElementById('t-name').style.color=th.acc;
  document.getElementById('t-ring').style.stroke=th.acc;
  document.getElementById('t-pg').style.background='linear-gradient(90deg,'+th.acc+',#c084fc)';
  if(ctx){document.getElementById('t-ctx').textContent='Sem.'+(ctx.w+1)+' · '+dlbl(calDate(ctx.w,ctx.d))+' · '+(ctx.p===0?'☀️ Matin':'🌙 Soir');}
  else document.getElementById('t-ctx').textContent='';
  startWave(th.acc,th.id,'t-wave');
  updateTimerUI();
  renderSons();
}

// Démarrer avec vérification ressenti obligatoire
function startTimer(th,ctx){
  if(!todayRessenti()){openRessenti({th:th,ctx:ctx});}
  else{startTimerReal(th,ctx);}
}

function updateTimerUI(){
  var CIRC=2*Math.PI*90,pct=Math.min(1,tSec/tTotal);
  var m=Math.floor(tSec/60),s=tSec%60;
  var el=document.getElementById('t-big');if(el)el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  var rem=Math.max(0,tTotal-tSec);var rm=Math.floor(rem/60),rs=rem%60;
  var rel=document.getElementById('t-rem');if(rel)rel.textContent='Reste '+String(rm).padStart(2,'0')+':'+String(rs).padStart(2,'0');
  var pg=document.getElementById('t-pg');if(pg)pg.style.width=(pct*100)+'%';
  var ring=document.getElementById('t-ring');if(ring){ring.style.strokeDasharray=CIRC;ring.style.strokeDashoffset=CIRC*(1-pct);}
}


// ═══ WAKE LOCK (empêche la veille pendant séance) ════════
var _wl=null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{
    _wl=await navigator.wakeLock.request('screen');
    _wl.addEventListener('release',function(){_wl=null;});
  }catch(e){}
}
function releaseWakeLock(){if(_wl){try{_wl.release();}catch(e){}}_wl=null;}
// Réacquérir après retour d'arrière-plan
document.addEventListener('visibilitychange',function wlHandler(){
  if(!document.hidden&&_wl===null&&tStart&&!tPaused){requestWakeLock();}
});

function pauseTimer(){
  tPaused=!tPaused;
  if(tPaused){
    tBase+=Math.floor((Date.now()-tStart)/1000);tStart=null;clearInterval(tInterval);
    // Suspendre le contexte audio — met en pause SANS tuer les nodes (fix iOS)
    if(AC&&AC.state==='running'){AC.suspend();}
  }else{
    tStart=Date.now();
    // Reprendre le contexte audio
    if(AC&&AC.state==='suspended'){AC.resume();}
    // Si le son s'est arrêté (iOS l'a tué), le recréer
    if(!activeNode&&tTh){
      var node=tTh.id==='notch'?playNotch(S.notchHz):tTh.play();
      if(node){activeNode=node;setVol(volVal);}
    }
    tInterval=setInterval(function(){if(tPaused)return;tSec=tBase+Math.floor((Date.now()-tStart)/1000);updateTimerUI();if(tSec>=tTotal){clearInterval(tInterval);finalizeSession(true);}},500);
  }
  var btn=document.getElementById('t-pause-btn');if(btn)btn.textContent=tPaused?'▶ Reprendre':'⏸ Pause';
  var lbl=document.getElementById('t-lbl');if(lbl)lbl.textContent=tPaused?'PAUSE':'EN COURS';
}

function validateTimer(){finalizeSession(false);}
function cancelTimer(){
  clearInterval(tInterval);stopSound();
  document.getElementById('timer-ov').classList.remove('open');
  activeId=null;renderSons();
}

function finalizeSession(auto){
  clearInterval(tInterval);stopSound();
  document.getElementById('timer-ov').classList.remove('open');
  var elapsed=Math.max(1,Math.round(tSec/60));
  S.stats.sessions++;S.stats.minutes+=elapsed;S.stats.streak++;
  if(tCtx)S.prog[tCtx.w][tCtx.d][tCtx.p]=true;
  var log={date:dStr(new Date()),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),thName:tTh?tTh.name:'',minutes:elapsed,week:tCtx?tCtx.w+1:null};
  S.sessionLogs=[log].concat(S.sessionLogs.slice(0,99));
  saveS();activeId=null;
  renderAll();
  if(auto)showToast('✅ Session terminée et sauvegardée !');
  else showToast('✅ Séance sauvegardée !');
}

// Visibility change
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if(tStart&&!tPaused){tBase+=Math.floor((Date.now()-tStart)/1000);tStart=null;clearInterval(tInterval);}
  }else{
    // Reprendre le contexte audio après veille iOS
    if(AC&&AC.state==='suspended'){AC.resume();}
    if(tBase>0&&activeId&&!tPaused){
      tStart=Date.now();
      // Recréer le son si iOS l'a tué pendant la veille
      if(!activeNode&&tTh){
        var node=tTh.id==='notch'?playNotch(S.notchHz):tTh.play();
        if(node){activeNode=node;setVol(volVal);}
      }
      tInterval=setInterval(function(){if(tPaused)return;tSec=tBase+Math.floor((Date.now()-tStart)/1000);updateTimerUI();if(tSec>=tTotal){clearInterval(tInterval);finalizeSession(true);}},500);
    }
  }
});

// Reprise audio sur interaction utilisateur (requis par iOS)
document.addEventListener('touchstart',function(){
  if(AC&&AC.state==='suspended'){AC.resume();}
},{passive:true});

// ═══ HELPERS ══════════════════════════════════════════════
function calDate(w,d){return addD(new Date(S.startDate),w*7+d);}
function startDate(){return new Date(S.startDate);}
function daysSince(){return Math.floor((new Date()-startDate())/(1000*60*60*24));}
function currentWeek(){return Math.min(11,Math.floor(daysSince()/7));}
function progDone(){var n=0;S.prog.forEach(function(wk){wk.forEach(function(d){d.forEach(function(v){if(v)n++;});});});return n;}
function progPct(){return Math.round(progDone()/(12*7*2)*100);}

var toastTm=null;
function showToast(msg){var el=document.getElementById('toast');if(!el)return;el.textContent=msg;el.classList.add('on');if(toastTm)clearTimeout(toastTm);toastTm=setTimeout(function(){el.classList.remove('on');},2800);}

// ═══ RENDER PROGRAMME ════════════════════════════════════
function renderProg(){
  var cw=currentWeek(),pp=progPct(),pd=progDone(),sd=startDate(),tr=todayRessenti();
  var html='';

  // Bannière ressenti si pas fait
  if(!tr){
    html+='<div class="card" style="background:#100a1a;border-color:#c084fc55;margin-bottom:10px">'
      +'<div style="font-size:11px;color:#c084fc;font-weight:600;margin-bottom:5px">⚠ Ressenti du jour requis</div>'
      +'<div style="font-size:10px;color:#4a5278;line-height:1.6;margin-bottom:9px">Tu dois remplir ton ressenti quotidien avant de pouvoir lancer une séance du programme.</div>'
      +'<button class="btn btn-w" style="border-color:#c084fc55;color:#c084fc" onclick="openRessenti(null)">📊 REMPLIR LE RESSENTI</button>'
      +'</div>';
  }

  // Progression globale
  html+='<div class="card card-hi" style="margin-bottom:10px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">'
    +'<div><span class="lbl">📅 PROGRAMME 12 SEMAINES</span><div style="font-size:9px;color:#4a5278">Démarré le '+dStr(sd)+'</div></div>'
    +'<div style="text-align:right"><div style="font-size:20px;color:#7aa2f7;font-family:monospace">'+pp+'%</div><div style="font-size:7px;color:#4a5278;font-family:monospace">COMPLÉTÉ</div></div>'
    +'</div>'
    +'<div class="prog-wrap" style="height:5px;margin-bottom:5px"><div class="prog-fill" style="width:'+pp+'%;background:linear-gradient(90deg,#4ade80,#7aa2f7)"></div></div>'
    +'<div style="font-size:9px;color:#4a5278;font-family:monospace">'+pd+' / '+(12*7*2)+' séances</div>'
    +'</div>';

  // Semaines
  for(var w=0;w<12;w++){
    var plan=PLAN[w];
    var done=0;S.prog[w].forEach(function(d){d.forEach(function(v){if(v)done++;});});
    var pct=Math.round(done/14*100),allDone=done===14,isExp=expandedWeek===w,isCur=w===cw;
    var ws=calDate(w,0),we=calDate(w,6);

      if(S.audiogramSaved.length>0){
        html+='<div class="card" style="margin-top:10px"><span class="lbl">📚 HISTORIQUE</span>';
        S.audiogramSaved.forEach(function(a){html+='<div style="padding:6px 9px;background:#080b12;border-radius:8px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:#4a5278;font-family:monospace">'+a.date+' '+a.time+'</span><div style="display:flex;gap:8px"><span style="font-size:9px;color:#60a5fa">G:'+(a.results.left.filter(function(r){return r&&r.answer==='tinnitus';}).length>0?'⚡':'✓')+'</span><span style="font-size:9px;color:#f472b6">D:'+(a.results.right.filter(function(r){return r&&r.answer==='tinnitus';}).length>0?'⚡':'✓')+'</span></div></div>';});
        html+='</div>';
      }
    }
  }
  document.getElementById('tab-audio').innerHTML=html;
}

function renderAudioSVG(){
  var W=310,H=150,PL=42,PR=14,PT=12,PB=28,cW2=W-PL-PR,cH2=H-PT-PB;
  function vY(v){return PT+cH2*(1-(v||0)/100);}
  function fX(i){return PL+(i/(AF.length-1))*cW2;}
  var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;border-radius:10px;background:#080b12">'
    +'<rect x="'+PL+'" y="'+PT+'" width="'+cW2+'" height="'+(cH2*.25)+'" fill="rgba(74,222,128,0.05)"/>';
  [0,25,50,75,100].forEach(function(db){svg+='<line x1="'+PL+'" y1="'+vY(100-db)+'" x2="'+(W-PR)+'" y2="'+vY(100-db)+'" stroke="#1a2038" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(vY(100-db)+3)+'" text-anchor="end" fill="#4a5278" font-size="7" font-family="monospace">'+db+'</text>';});
  AF.forEach(function(f,i){svg+='<text x="'+fX(i)+'" y="'+(H-PB+11)+'" text-anchor="middle" fill="#4a5278" font-size="7" font-family="monospace">'+(f>=1000?f/1000+'k':f)+'</text>';});
  ['left','right'].forEach(function(ear){
    var col=ear==='left'?'#60a5fa':'#f472b6',sym=ear==='left'?'×':'○';
    var pts=audioResults[ear].map(function(r,i){return r?{x:fX(i),y:vY(r.vol),r:r}:null;}).filter(Boolean);
    if(pts.length>1)pts.forEach(function(p,i){if(i>0)svg+='<line x1="'+pts[i-1].x+'" y1="'+pts[i-1].y+'" x2="'+p.x+'" y2="'+p.y+'" stroke="'+col+'" stroke-width="1.5" stroke-dasharray="'+(ear==='right'?'4,2':'none')+'" opacity=".7"/>';});
    pts.forEach(function(p){
      var fc={normal:'#4ade80',low:'#fbbf24',tinnitus:'#c084fc',none:'#f87171'}[p.r.answer]||col;
      svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="6" fill="'+fc+'" stroke="'+col+'" stroke-width="1.5"/>'
        +'<text x="'+p.x+'" y="'+(p.y+3)+'" text-anchor="middle" fill="#080b12" font-size="7" font-family="monospace" font-weight="bold">'+sym+'</text>';
    });
  });
  svg+='<line x1="'+PL+'" y1="'+(H-3)+'" x2="'+(PL+16)+'" y2="'+(H-3)+'" stroke="#60a5fa" stroke-width="2"/><text x="'+(PL+20)+'" y="'+H+'" fill="#60a5fa" font-size="7" font-family="monospace">× G</text>'
    +'<line x1="'+(PL+46)+'" y1="'+(H-3)+'" x2="'+(PL+62)+'" y2="'+(H-3)+'" stroke="#f472b6" stroke-width="2" stroke-dasharray="4,2"/><text x="'+(PL+66)+'" y="'+H+'" fill="#f472b6" font-size="7" font-family="monospace">○ D</text>'
    +'</svg>';
  return svg;
}

function setAudioSubTab(t){audioSubTab=t;if(t==='test')resetAudio();renderAudio();}
function toggleTestTone(){if(testPlaying){if(testNode){testNode.stop();testNode=null;}testPlaying=false;}else{var n=playTone(testHz,40,'both');if(!n){showToast('⚠ Audio non disponible');return;}testNode=n;testPlaying=true;}renderAudio();}
function applyTestHz(){S.notchHz=testHz;saveS();showTab('sons');showToast('Notch → '+testHz+' Hz');}
function toggleAudioTone(){if(audioTonePlaying){if(audioToneNode){audioToneNode.stop();audioToneNode=null;}audioTonePlaying=false;}else{var n=playTone(AF[audioStep],audioVol,audioEar);if(!n){showToast('⚠ Audio non disponible');return;}audioToneNode=n;audioTonePlaying=true;}renderAudio();}
function answerAudio(ans){
  if(audioToneNode){audioToneNode.stop();audioToneNode=null;}audioTonePlaying=false;
  audioResults[audioEar][audioStep]={freq:AF[audioStep],answer:ans,vol:audioVol};
  var nx=audioStep+1;
  if(nx>=AF.length){if(audioEar==='left'){audioEar='right';audioStep=0;audioVol=50;showToast('✅ Oreille gauche OK !');}else{setAudioSubTab('result');showToast('✅ Audiogramme complet !');}}
  else{audioStep=nx;audioVol=50;}
  renderAudio();
}
function resetAudio(){if(audioToneNode){audioToneNode.stop();audioToneNode=null;}audioTonePlaying=false;audioStep=0;audioEar='left';audioVol=50;audioResults={left:Array(8).fill(null),right:Array(8).fill(null)};}
function saveAudiogram(){S.audiogramSaved=[{date:dStr(new Date()),time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),results:{left:audioResults.left.slice(),right:audioResults.right.slice()}}].concat(S.audiogramSaved.slice(0,4));saveS();showToast('💾 Sauvegardé');renderAudio();}

// ═══ RENDER EXERCICES ═════════════════════════════════════
var exActive=null,exStep=0,exSec=0,exInterval=null;
var EXERCISES=[
  {id:'breath',name:'Respiration 4-7-8',ic:'🫁',col:'#60a5fa',steps:['Inspire par le nez — 4 secondes','Retiens — 7 secondes','Expire — 8 secondes','Répète 4 fois']},
  {id:'muscle',name:'Relaxation Musculaire',ic:'💆',col:'#4ade80',steps:['Contracte pieds 5s → relâche','Contracte mollets 5s → relâche','Contracte cuisses 5s → relâche','Contracte ventre 5s → relâche','Contracte épaules 5s → relâche','Contracte visage 5s → relâche']},
  {id:'mindful',name:'Pleine Conscience',ic:'🧘',col:'#c084fc',steps:['Ferme les yeux, observe le silence','Identifie l\'acouphène sans résistance','Observe-le comme sensation neutre','Dirige l\'attention vers ta respiration','Reviens à l\'environnement']},
  {id:'jaw',name:'Détente Mâchoire',ic:'😮',col:'#fbbf24',steps:['Bouche max 3s → relâche','Mâche lentement 10 fois','Tête gauche-droite 5 fois','Penche tête vers épaules 10s','Masse les tempes en cercles']},
];
function renderEx(){
  var html='';
  if(!exActive){
    EXERCISES.forEach(function(ex){
      html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div style="display:flex;align-items:center;gap:7px"><span style="font-size:18px">'+ex.ic+'</span><div style="font-size:12px;color:#c8d0e8;font-weight:600">'+ex.name+'</div></div>'
        +'<button class="btn" style="padding:7px 12px;font-size:8px;border-color:'+ex.col+'55;color:'+ex.col+'" onclick="startEx(\''+ex.id+'\')">COMMENCER</button>'
        +'</div></div>';
    });
  }else{
    var stepPcts=exActive.steps.map(function(_,i){return '<div style="flex:1;height:3px;border-radius:99px;background:'+(i<=exStep?exActive.col:'#1a2038')+';transition:background .3s"></div>';}).join('');
    html='<div class="card" style="background:#0d1228;border-color:'+exActive.col+'55">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:12px;color:'+exActive.col+'">'+exActive.ic+' '+exActive.name+'</div><div id="ex-timer" style="font-size:11px;color:#4a5278;font-family:monospace">'+fmt(exSec)+'</div></div>'
      +'<div style="display:flex;gap:4px;margin-bottom:12px">'+stepPcts+'</div>'
      +'<div style="background:#080b12;border-radius:12px;padding:14px;text-align:center;margin-bottom:12px">'
      +'<div style="font-size:9px;color:#4a5278;letter-spacing:2px;font-family:monospace;margin-bottom:7px">ÉTAPE '+(exStep+1)+' / '+exActive.steps.length+'</div>'
      +'<div style="font-size:13px;color:#c8d0e8;line-height:1.7">'+exActive.steps[exStep]+'</div>'
      +'</div>'
      +'<div style="display:flex;gap:8px">'
      +'<button class="btn" style="flex:1;border-color:#4a5278;color:#4a5278" onclick="cancelEx()">ANNULER</button>'
      +'<button class="btn" style="flex:2;border-color:'+exActive.col+'44;color:'+exActive.col+'" onclick="nextExStep()">'+(exStep<exActive.steps.length-1?'SUIVANTE →':'TERMINER ✓')+'</button>'
      +'</div></div>';
  }
  document.getElementById('tab-ex').innerHTML=html;
}
function startEx(id){exActive=EXERCISES.filter(function(e){return e.id===id;})[0];exStep=0;exSec=0;clearInterval(exInterval);exInterval=setInterval(function(){exSec++;var el=document.getElementById('ex-timer');if(el)el.textContent=fmt(exSec);},1000);renderEx();}
function nextExStep(){if(exStep<exActive.steps.length-1){exStep++;renderEx();}else cancelEx();}
function cancelEx(){clearInterval(exInterval);exActive=null;renderEx();}

// ═══ RENDER DATA ══════════════════════════════════════════
var saveCode='',showRestoreInput=false;
function renderData(){
  var pd=progDone(),pp=progPct(),ds=daysSince();
  var missed=0;for(var w=0;w<12;w++){for(var d=0;d<7;d++){var rd=calDate(w,d);if(isPst(rd)&&!isT(rd)){if(!S.prog[w][d][0])missed++;if(!S.prog[w][d][1])missed++;}}}
  var html='<div class="card" style="background:#0a1a0a;border-color:#4ade8066;margin-bottom:10px">'
    +'<div style="font-size:11px;color:#4ade80;font-weight:600;margin-bottom:5px">💾 SAUVEGARDER</div>'
    +'<div style="font-size:10px;color:#4a5278;line-height:1.7;margin-bottom:9px">Génère un code — copie-le dans tes <strong style="color:#c8d0e8">Notes iPhone</strong>. Colle-le ici pour restaurer tes données.</div>'
    +'<button class="btn btn-g btn-w" style="margin-bottom:'+(saveCode?'10px':'0')+'" onclick="genCode()">💾 GÉNÉRER MON CODE</button>'
    +(saveCode?'<div><div class="lbl" style="margin-top:8px">TON CODE — APPUIE POUR TOUT SÉLECTIONNER :</div>'
      +'<div onclick="var r=document.createRange();r.selectNode(this);window.getSelection().removeAllRanges();window.getSelection().addRange(r);try{navigator.clipboard.writeText(this.textContent).then(function(){showToast(\'📋 Copié !\');});}catch(e){}" style="background:#080b12;border-radius:10px;padding:10px 12px;border:1px solid #4ade8044;margin-bottom:8px;word-break:break-all;font-size:10px;color:#4ade80;font-family:monospace;line-height:1.6;cursor:pointer;-webkit-user-select:all;user-select:all">'+saveCode+'</div>'
      +'<button class="btn btn-g btn-w" style="font-size:9px" onclick="try{navigator.clipboard.writeText(\''+saveCode+'\').then(function(){showToast(\'📋 Copié !\');}).catch(function(){showToast(\'Appuie sur le texte vert\');});}catch(e){showToast(\'Appuie sur le texte vert\');}">📋 COPIER</button></div>':'')
    +'</div>'
    +'<div class="card card-hi" style="margin-bottom:10px">'
    +'<div style="font-size:11px;color:#7aa2f7;font-weight:600;margin-bottom:5px">🔄 RESTAURER</div>'
    +(showRestoreInput
      ?'<textarea id="restore-in" rows="4" placeholder="Colle ton code ici…" style="word-break:break-all;font-size:11px;font-family:monospace;margin-bottom:9px"></textarea>'
       +'<div style="display:flex;gap:8px"><button class="btn" style="flex:1;font-size:9px;border-color:#4a5278;color:#4a5278" onclick="showRestoreInput=false;renderData()">ANNULER</button><button class="btn btn-p" style="flex:2;font-size:9px" onclick="doRestore()">✅ RESTAURER</button></div>'
      :'<button class="btn btn-p btn-w" onclick="showRestoreInput=true;renderData()">🔄 COLLER MON CODE</button>')
    +'</div>'
    +'<div class="card" style="margin-bottom:10px"><span class="lbl">📊 STATISTIQUES</span>'
    +[['Jour','Jour '+(Math.max(1,ds+1))+' / 84'],['Semaine','Sem.'+(currentWeek()+1)+' — '+PHASES[currentWeek()]],['Sessions',S.stats.sessions],['Minutes',S.stats.minutes+' min'],['Série',S.stats.streak+' j'],['Notch',S.notchHz+' Hz'],['Programme',pp+'%'],['Ressentis',S.dailyLogs.length+' jours'],['Manquées',missed]].map(function(x){
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 9px;background:#080b12;border-radius:8px;margin-bottom:5px"><span style="font-size:10px;color:#4a5278">'+x[0]+'</span><span style="font-size:11px;color:#7aa2f7;font-family:monospace">'+x[1]+'</span></div>';
    }).join('')+'</div>'
    +'<div class="card" style="background:#100808;border-color:#f8717144">'
    +'<span class="lbl" style="color:#f87171">⚠ RÉINITIALISER</span>'
    +'<div style="font-size:10px;color:#4a5278;margin-bottom:8px">Génère un code avant !</div>'
    +'<button class="btn btn-r btn-w" onclick="if(confirm(\'Effacer TOUTES les données ?\')){S=blank();saveS();location.reload();}">RÉINITIALISER TOUT</button>'
    +'</div>';
  document.getElementById('tab-data').innerHTML=html;
}
function genCode(){
  try{
    var c={v:4,sd:S.startDate,p:S.prog,sl:S.sessionLogs.slice(0,30),j:S.journal.slice(0,30),dl:S.dailyLogs.slice(0,60),st:S.stats,nh:S.notchHz,as:S.audiogramSaved};
    saveCode=btoa(unescape(encodeURIComponent(JSON.stringify(c))));
    try{navigator.clipboard.writeText(saveCode).then(function(){showToast('📋 Code copié !');}). catch(function(){showToast('Code généré — appuie dessus');});}catch(e){showToast('Code généré — appuie sur le texte vert');}
    renderData();
  }catch(e){showToast('Erreur');}
}
function doRestore(){
  var el=document.getElementById('restore-in');if(!el)return;
  try{
    var json=decodeURIComponent(escape(atob(el.value.trim())));
    var c=JSON.parse(json);if(!c.v||!c.p){showToast('❌ Code invalide');return;}
    S=mergeS({version:4,startDate:c.sd,prog:c.p,sessionLogs:c.sl||[],journal:c.j||[],dailyLogs:c.dl||[],stats:c.st||{},notchHz:c.nh||8000,audiogramSaved:c.as||[]});
    saveS();showRestoreInput=false;showToast('✅ Données restaurées !');renderAll();
  }catch(e){showToast('❌ Code invalide');}
}

// ═══ NAVIGATION ═══════════════════════════════════════════
var TABS=['sons','prog','audio','ex','journal','data'];
function showTab(id){
  TABS.forEach(function(t){document.getElementById('tab-'+t).style.display=t===id?'block':'none';});
  document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('on',TABS[i]===id);});
  if(id==='sons')renderSons();
  else if(id==='prog')renderProg();
  else if(id==='audio')renderAudio();
  else if(id==='ex')renderEx();
  else if(id==='journal')renderJournal();
  else if(id==='data')renderData();
}
function renderAll(){
  document.getElementById('hdr-sub').textContent='Démarré le '+dStr(startDate())+' · Jour '+(Math.max(1,daysSince()+1))+' · Sem.'+(currentWeek()+1);
  var active=document.querySelector('.tab.on');
  var id=active?TABS[Array.from(document.querySelectorAll('.tab')).indexOf(active)]:'sons';
  showTab(id);
}

// ═══ INIT ═════════════════════════════════════════════════
window.addEventListener('load',function(){
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
  renderAll();
});
</script>
